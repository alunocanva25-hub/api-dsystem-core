services:
  db:
    image: postgres:16
    container_name: dsystem_core_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dsystem_core
      POSTGRES_USER: dsystem
      POSTGRES_PASSWORD: dsystem123
    ports:
      - "5432:5432"
    volumes:
      - dsystem_pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: dsystem_server_core_api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      APP_NAME: DSYSTEM SERVER CORE
      APP_VERSION: 1.0.1.7
      ENVIRONMENT: production
      SECRET_KEY: troque-esta-chave-em-producao
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      DATABASE_URL: postgresql+psycopg2://dsystem:dsystem123@db:5432/dsystem_core
      MASTER_USERNAME: master
      MASTER_PASSWORD: master123
      MASTER_FULL_NAME: Master DSYSTEM
      MASTER_EMAIL: master@dsystem.local
      DEFAULT_COMPANY_NAME: DSYSTEM MASTER
      DEFAULT_COMPANY_SLUG: dsystem-master
    ports:
      - "8000:8000"
    command: sh -c "python scripts/init_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  dsystem_pgdata:
